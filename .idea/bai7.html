<script>
  let a = Number(prompt("Số a"));
  let b = Number(prompt("Số b"));
  let c = Number(prompt("Số c"));
  let ketQua=b*b-4*a*c;
  let x1;
  let x2;
  if (ketQua < 0) {
    alert("Phương trình vô ngiệm");
  } else if (ketQua === 0) {
    alert(`Có nghiệm kép là:${x1 = x2 = -b /( 2 * a)}`)
  } else {
    alert(`Có 2 nghiệm là: ${x1 = (-b + Math.sqrt(ketQua)) / 2 * a} và ${x2 = (-b - Math.sqrt(ketQua)) / 2 * a}`);
  }
</script>
