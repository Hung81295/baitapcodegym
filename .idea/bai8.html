<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>bài 8</title>
</head>
<body>
<script>
  let soTuoi=Number(prompt("Nhập tuổi"));
  if(soTuoi>120 || soTuoi<=0 || !Number.isFinite(soTuoi)){
    alert("Số tuổi không hợp lệ")
  }else {
    alert(`Số tuổi hợp lệ là:${soTuoi}`)
  }
</script>
</body>
</html>
