<script>
  let a=Number(prompt("Nhập số a"));
  let b=Number(prompt("Nhập số b"));
  let c=Number(prompt("Nhập số c"));
  if(a>0&&b>0&&c>0&&a+b>c&&b+c>a&&c+a>b){
    alert("Là 1 tam giác")
  }else {
    alert("Không thể tạo thành 1 tam giác")
  }
</script>
